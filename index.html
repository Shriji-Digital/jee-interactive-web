<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyansh's Rise // BEAST MODE</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti for Milestone Rewards -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b',
                        accent: '#10b981',
                        danger: '#ef4444',
                        iit: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .flame-glow { text-shadow: 0 0 15px rgba(239, 68, 68, 0.8); animation: pulse 2s infinite; }
        .iit-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.8); }
        @keyframes pulse { 0% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.8; transform: scale(1); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Header & Stats -->
    <div class="max-w-5xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2">
                PRIYANSH'S <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-500">RISE</span>
            </h1>
            <p class="text-gray-400 text-sm tracking-widest uppercase">Target: IIT 2027 // Beast Mode Engaged</p>
        </div>
        
        <div class="flex gap-4">
            <div class="glass-card px-6 py-3 rounded-2xl flex items-center gap-3">
                <i class="fas fa-star text-yellow-400 text-xl"></i>
                <div>
                    <div class="text-xs text-gray-400 uppercase">Rank XP</div>
                    <div class="font-bold text-xl" id="xp-display">0</div>
                </div>
            </div>
            <div class="glass-card px-6 py-3 rounded-2xl flex items-center gap-3">
                <i class="fas fa-shield-halved text-iit text-xl"></i>
                <div>
                    <div class="text-xs text-gray-400 uppercase">Shields</div>
                    <div class="font-bold text-xl" id="shield-display">1</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Motivational Quote -->
    <div class="max-w-5xl mx-auto glass-card rounded-2xl p-6 mb-8 text-center border-l-4 border-l-iit relative overflow-hidden">
        <div class="absolute -right-4 -top-4 opacity-10 text-8xl"><i class="fas fa-quote-right"></i></div>
        <p class="text-xl md:text-2xl font-semibold italic text-gray-200" id="daily-quote">"While others sleep, you build your future."</p>
        <p class="text-sm text-iit mt-2 font-bold uppercase tracking-wider" id="level-display">Status: Loading...</p>
    </div>

    <!-- Add New Streak Controls -->
    <div class="max-w-5xl mx-auto glass-card rounded-2xl p-6 mb-10 flex flex-col md:flex-row gap-4 items-end">
        <div class="flex-1 w-full">
            <label class="block text-xs text-gray-400 uppercase mb-2">New Mission / Habit</label>
            <input type="text" id="habit-name" placeholder="e.g., 8 Hours Study, Physics H.C. Verma..." class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-accent transition">
        </div>
        <div class="w-full md:w-48">
            <label class="block text-xs text-gray-400 uppercase mb-2">Custom Start Count</label>
            <input type="number" id="habit-start-count" placeholder="Starts at 0" min="0" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-accent transition">
        </div>
        <button onclick="addHabit()" class="w-full md:w-auto bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-white font-bold py-3 px-8 rounded-lg shadow-lg shadow-emerald-500/30 transition transform hover:-translate-y-1">
            <i class="fas fa-plus mr-2"></i> Deploy
        </button>
    </div>

    <!-- Firebase Status -->
    <div class="max-w-5xl mx-auto mb-4 text-xs text-gray-400 flex justify-between items-center">
        <span id="db-status"><i class="fas fa-circle-notch fa-spin mr-1"></i> Connecting to Firebase...</span>
        <button onclick="clearData()" class="hover:text-danger transition"><i class="fas fa-trash mr-1"></i> Factory Reset</button>
    </div>

    <!-- Streaks Grid -->
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="habits-container">
        <!-- Habit Cards will be generated here by JS -->
    </div>

    <!-- FIREBASE MODULE SCRIPT -->
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your specific Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAKR7lZDRiGjmx7g_bRLkVyYiH8lf4v7gE",
            authDomain: "jee-interactive-web.firebaseapp.com",
            projectId: "jee-interactive-web",
            storageBucket: "jee-interactive-web.firebasestorage.app",
            messagingSenderId: "287271345110",
            appId: "1:287271345110:web:e18892c99019321c872277",
            measurementId: "G-5QL89VWD1V"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'userData/priyansh_rise'); // Path in the database

        // Initial State
        let state = {
            xp: 0,
            shields: 1,
            habits: []
        };

        const quotes = [
            "The syllabus is vast, but your resolve is stronger.",
            "Today's pain is tomorrow's AIR.",
            "IIT Bombay isn't a dream; it's a destination.",
            "Compounding focus: 1% better every single day.",
            "Do it now. Sometimes 'later' becomes 'never'.",
            "Discipline is choosing between what you want now and what you want most."
        ];

        // Realtime Listener: Automatically fetches and updates when data changes anywhere
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state = data;
                // Ensure habits is an array (Firebase removes empty arrays)
                if (!state.habits) state.habits = [];
            } else {
                // If database is completely empty, initialize it with the default state
                set(dbRef, state);
            }
            document.getElementById('db-status').innerHTML = '<span class="text-emerald-500"><i class="fas fa-circle mr-1 text-[10px]"></i> Live Sync Active</span>';
            updateUI();
        }, (error) => {
            document.getElementById('db-status').innerHTML = '<span class="text-danger"><i class="fas fa-triangle-exclamation mr-1"></i> Connection Error</span>';
            console.error("Firebase connection error:", error);
        });

        // Function to push state to Firebase
        function saveData() {
            set(dbRef, state);
        }

        // --- Core Functions (Attached to window so HTML onclick works) ---

        window.addHabit = function() {
            const nameInput = document.getElementById('habit-name');
            const countInput = document.getElementById('habit-start-count');
            
            const name = nameInput.value.trim();
            const startCount = parseInt(countInput.value) || 0;

            if (!name) return alert("Enter a mission objective!");

            const newHabit = {
                id: Date.now().toString(),
                name: name,
                currentStreak: startCount,
                maxStreak: startCount,
                lastCompleted: null
            };

            state.habits.push(newHabit);
            nameInput.value = '';
            countInput.value = '';
            saveData();
        };

        function getTodayStr() {
            const now = new Date();
            // Important: Handle timezone formatting safely
            return `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
        }

        function triggerConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#10b981', '#3b82f6', '#fbbf24']
            });
        }

        function checkLevelUp() {
            const levelDisplay = document.getElementById('level-display');
            let status = "Aspirant";
            if (state.xp >= 1000) status = "ADVANCE WARRIOR (Tier 1)";
            else if (state.xp >= 500) status = "Mains Ready (Tier 2)";
            else if (state.xp >= 200) status = "Concept Master (Tier 3)";
            
            levelDisplay.innerText = `Status: ${status}`;
        }

        window.markDone = function(id) {
            const habit = state.habits.find(h => h.id === id);
            const today = getTodayStr();

            if (habit.lastCompleted === today) return;

            habit.currentStreak++;
            habit.lastCompleted = today;
            if (habit.currentStreak > habit.maxStreak) {
                habit.maxStreak = habit.currentStreak;
            }

            // XP Logic
            state.xp += 15;

            // Milestones Logic
            const milestones = [7, 14, 21, 30, 45, 60, 90, 100];
            if (milestones.includes(habit.currentStreak)) {
                state.xp += 50;
                setTimeout(triggerConfetti, 300);
                alert(`🔥 MILESTONE REACHED: ${habit.currentStreak} Days of ${habit.name}! Beast Mode Active.`);
            }

            saveData();
        };

        window.resetHabit = function(id) {
            const habit = state.habits.find(h => h.id === id);
            
            if (state.shields > 0) {
                const useShield = confirm("Streak broken! You have a Shield active. Use 1 Shield to freeze your streak and prevent reset?");
                if (useShield) {
                    state.shields--;
                    habit.lastCompleted = getTodayStr(); 
                    alert("Shield activated! Streak frozen.");
                    saveData();
                    return;
                }
            }

            const confirmReset = confirm(`Reset ${habit.name} back to 0?`);
            if (confirmReset) {
                habit.currentStreak = 0;
                habit.lastCompleted = null;
                saveData();
            }
        };

        window.deleteHabit = function(id) {
            if(confirm("Delete this mission?")) {
                state.habits = state.habits.filter(h => h.id !== id);
                saveData();
            }
        };

        window.clearData = function() {
            if(confirm("WARNING: This wipes all progress and XP permanently from the database. Proceed?")) {
                state = { xp: 0, shields: 1, habits: [] };
                saveData(); // Overwrite database with empty state
            }
        };

        function updateUI() {
            document.getElementById('xp-display').innerText = state.xp;
            document.getElementById('shield-display').innerText = state.shields;
            checkLevelUp();

            const container = document.getElementById('habits-container');
            container.innerHTML = '';
            
            const today = getTodayStr();

            state.habits.forEach(habit => {
                const isDoneToday = habit.lastCompleted === today;
                
                let flameColor = "text-gray-600";
                let glowClass = "";
                if (habit.currentStreak > 0) flameColor = "text-yellow-500";
                if (habit.currentStreak >= 7) flameColor = "text-orange-500";
                if (habit.currentStreak >= 14) flameColor = "text-danger";
                if (habit.currentStreak >= 30) { flameColor = "text-iit"; glowClass = "iit-glow"; }
                if (habit.currentStreak >= 90) { flameColor = "text-purple-500"; glowClass = "flame-glow"; }

                const card = document.createElement('div');
                card.className = `glass-card rounded-2xl p-6 flex flex-col relative transition-all duration-300 ${isDoneToday ? 'border-emerald-500/50' : ''}`;
                
                card.innerHTML = `
                    <button onclick="deleteHabit('${habit.id}')" class="absolute top-4 right-4 text-gray-600 hover:text-danger transition">
                        <i class="fas fa-times"></i>
                    </button>
                    
                    <div class="flex items-center gap-4 mb-4">
                        <div class="text-4xl ${flameColor} ${glowClass}">
                            <i class="fas fa-fire"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg leading-tight truncate w-48">${habit.name}</h3>
                            <p class="text-xs text-gray-400 mt-1">Max Streak: ${habit.maxStreak} Days</p>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <div class="text-5xl font-black text-white">${habit.currentStreak}</div>
                            <div class="text-xs uppercase tracking-wider text-gray-400 mt-1">Days</div>
                        </div>
                        ${isDoneToday ? 
                            `<span class="bg-emerald-500/20 text-emerald-400 text-xs font-bold px-3 py-1 rounded-full"><i class="fas fa-check mr-1"></i> DONE</span>` 
                            : 
                            `<span class="bg-gray-700 text-gray-300 text-xs font-bold px-3 py-1 rounded-full">PENDING</span>`
                        }
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mt-auto">
                        <button onclick="markDone('${habit.id}')" class="${isDoneToday ? 'bg-slate-700 text-slate-400 cursor-not-allowed' : 'bg-accent hover:bg-emerald-400 text-white shadow-lg shadow-emerald-500/20'} font-bold py-2 rounded-lg transition" ${isDoneToday ? 'disabled' : ''}>
                            ${isDoneToday ? 'Secured' : 'Mark Done'}
                        </button>
                        <button onclick="resetHabit('${habit.id}')" class="bg-slate-800 hover:bg-danger text-gray-300 hover:text-white font-bold py-2 rounded-lg transition">
                            Reset
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Initialize Quote of the day
        document.getElementById('daily-quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        
    </script>
</body>
  </html>
