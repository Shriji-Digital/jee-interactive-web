<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyansh's Rise // BEAST MODE</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        darkBg: '#0b1120',
                        cardBg: '#1e293b',
                        accent: '#10b981',
                        danger: '#ef4444',
                        iit: '#3b82f6',
                        iitDark: '#1e3a8a'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b1120; color: white; overflow-x: hidden; transition: filter 1s ease; }
        
        /* Glassmorphism & Glowing Effects */
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .flame-glow { text-shadow: 0 0 15px rgba(239, 68, 68, 0.9); animation: pulse 2s infinite; }
        .iit-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.9); animation: pulse 2.5s infinite; }
        .heat-glow { box-shadow: 0 0 10px rgba(52, 211, 153, 0.8); }
        
        /* Relapse Tax - Recovery Mode */
        .recovery-mode { filter: grayscale(85%) brightness(0.8); }
        
        @keyframes pulse { 0% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.8; transform: scale(1); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b1120; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body id="app-body" class="min-h-screen p-4 md:p-8">

    <!-- Top Navigation / Header -->
    <div class="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-4xl md:text-5xl font-black tracking-tight mb-2 flex items-center gap-3">
                PRIYANSH'S <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-500">RISE</span>
                <i data-lucide="rocket" class="text-blue-400" width="32" height="32"></i>
            </h1>
            <p id="system-status" class="text-gray-400 text-sm tracking-widest uppercase font-bold text-accent">System Online // Target: IIT 2027</p>
        </div>
        
        <div class="flex gap-4">
            <div class="glass-card px-6 py-3 rounded-2xl flex items-center gap-3 border-b-2 border-b-yellow-500">
                <i data-lucide="star" class="text-yellow-400 fill-yellow-400"></i>
                <div>
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Rank XP</div>
                    <div class="font-black text-xl leading-none" id="xp-display">0</div>
                </div>
            </div>
            <div class="glass-card px-6 py-3 rounded-2xl flex items-center gap-3 border-b-2 border-b-iit">
                <i data-lucide="shield" class="text-iit fill-iit/20"></i>
                <div>
                    <div class="text-[10px] text-gray-400 uppercase font-bold">Shields</div>
                    <div class="font-black text-xl leading-none" id="shield-display">1</div>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10">
        
        <!-- Left Column: War Cry & Deep Work Analytics -->
        <div class="lg:col-span-1 flex flex-col gap-6">
            
            <!-- Daily War Cry -->
            <div class="glass-card rounded-2xl p-6 border-l-4 border-l-danger">
                <h2 class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-3 flex items-center gap-2">
                    <i data-lucide="swords" width="16" height="16" class="text-danger"></i> Daily War Cry
                </h2>
                <textarea id="warcry-input" onchange="window.saveWarCry()" placeholder="e.g., I will finish Rotation Mechanics today no matter what." class="w-full bg-slate-800/50 border border-slate-700 rounded-lg p-3 text-sm text-white focus:outline-none focus:border-danger transition resize-none" rows="3"></textarea>
                <p class="text-[10px] text-gray-500 mt-2 text-right">Auto-saves to database.</p>
            </div>

            <!-- Deep Work Analytics -->
            <div class="glass-card rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 opacity-5"><i data-lucide="brain" width="100" height="100"></i></div>
                <h2 class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="activity" width="16" height="16" class="text-accent"></i> Focus Heatmap
                </h2>
                
                <div class="mb-4">
                    <p class="text-[10px] uppercase text-gray-500 mb-2">Log Today's Study Intensity</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="window.logDeepWork(2)" class="bg-slate-800 hover:bg-emerald-900 text-xs py-2 rounded font-bold text-gray-300 transition">0-3 Hrs</button>
                        <button onclick="window.logDeepWork(6)" class="bg-slate-800 hover:bg-emerald-600 text-xs py-2 rounded font-bold text-gray-300 transition">4-7 Hrs</button>
                        <button onclick="window.logDeepWork(10)" class="bg-slate-800 hover:bg-emerald-400 hover:text-slate-900 text-xs py-2 rounded font-bold text-gray-300 transition shadow-[0_0_10px_rgba(16,185,129,0)] hover:shadow-[0_0_10px_rgba(16,185,129,0.5)]">8-12+ Hrs</button>
                    </div>
                </div>

                <div class="bg-slate-900/80 p-3 rounded-lg border border-slate-700/50">
                    <div id="heatmap-container" class="flex flex-wrap gap-1.5 justify-end">
                        <!-- Heatmap cells injected here -->
                    </div>
                </div>
            </div>
            
            <!-- Motivational Quote -->
            <div class="glass-card rounded-2xl p-6 text-center">
                <i data-lucide="quote" class="text-slate-600 mx-auto mb-2" width="24" height="24"></i>
                <p class="text-sm font-semibold italic text-gray-300" id="daily-quote">Loading wisdom...</p>
                <div class="mt-4 pt-4 border-t border-slate-700/50 inline-block">
                    <span class="bg-iitDark text-blue-200 text-xs font-bold px-3 py-1 rounded-full border border-blue-500/30" id="level-display">Status: Aspirant</span>
                </div>
            </div>
        </div>

        <!-- Right Column: Streaks Engine -->
        <div class="lg:col-span-2 flex flex-col gap-6">
            
            <!-- Add New Mission -->
            <div class="glass-card rounded-2xl p-6 flex flex-col sm:flex-row gap-4 items-end bg-gradient-to-br from-slate-800/80 to-slate-900/80">
                <div class="flex-1 w-full">
                    <label class="block text-xs text-gray-400 uppercase font-bold mb-2">New Mission Protocol</label>
                    <input type="text" id="habit-name" placeholder="e.g., NoFap, Exercise, Read 10 pgs..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-accent transition">
                </div>
                <div class="w-full sm:w-32">
                    <label class="block text-xs text-gray-400 uppercase font-bold mb-2">Start Count</label>
                    <input type="number" id="habit-start-count" placeholder="0" min="0" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-accent transition">
                </div>
                <button onclick="window.addHabit()" class="w-full sm:w-auto bg-white text-slate-900 hover:bg-gray-200 font-black py-3 px-6 rounded-lg transition shadow-[0_0_15px_rgba(255,255,255,0.2)] flex items-center justify-center gap-2">
                    <i data-lucide="plus" width="20" height="20"></i> Deploy
                </button>
            </div>

            <!-- Streaks Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="habits-container">
                <!-- Habit Cards generated here -->
            </div>
        </div>
    </div>

    <!-- Firebase Connection Status -->
    <div class="max-w-6xl mx-auto flex justify-between items-center text-[10px] uppercase font-bold tracking-widest text-gray-600">
        <span id="db-status" class="flex items-center gap-2">
            <i data-lucide="loader-2" class="animate-spin" width="14" height="14"></i> Establishing Uplink...
        </span>
        <button onclick="window.clearData()" class="hover:text-danger transition flex items-center gap-1">
            <i data-lucide="trash-2" width="12" height="12"></i> Factory Reset
        </button>
    </div>

    <!-- Milestone Modal (Hidden by default) -->
    <div id="milestone-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-gradient-to-b from-slate-800 to-slate-900 p-10 rounded-3xl border border-accent shadow-[0_0_50px_rgba(16,185,129,0.3)] text-center max-w-md mx-4 transform scale-95 transition-transform duration-300" id="modal-content">
            <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="trophy" class="text-accent" width="40" height="40"></i>
            </div>
            <h2 id="modal-title" class="text-3xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-400">LEVEL UP</h2>
            <p id="modal-msg" class="text-gray-300 mb-8">You reached a new milestone.</p>
            <button onclick="window.closeModal()" class="bg-accent hover:bg-emerald-400 text-slate-900 font-bold py-3 px-8 rounded-xl transition w-full">
                Acknowledge
            </button>
        </div>
    </div>

    <!-- FIREBASE MODULE SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKR7lZDRiGjmx7g_bRLkVyYiH8lf4v7gE",
            authDomain: "jee-interactive-web.firebaseapp.com",
            projectId: "jee-interactive-web",
            storageBucket: "jee-interactive-web.firebasestorage.app",
            messagingSenderId: "287271345110",
            appId: "1:287271345110:web:e18892c99019321c872277",
            measurementId: "G-5QL89VWD1V"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'userData/priyansh_rise');

        let state = {
            xp: 0,
            shields: 1,
            habits: [],
            dailyLogs: {}, // 'YYYY-MM-DD': intensity
            warCry: "",
            recoveryUntil: null
        };

        const quotes = [
            "The syllabus is vast, but your resolve is stronger.",
            "Today's pain is tomorrow's AIR.",
            "IIT Bombay isn't a dream; it's a destination.",
            "Compounding focus: 1% better every single day.",
            "If it was easy, everyone would do it.",
            "Discipline is choosing between what you want now and what you want most."
        ];

        // Format Date safely to YYYY-MM-DD
        function getTodayStr() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // Live Database Sync Listener
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state = { ...state, ...data };
                if (!state.habits) state.habits = [];
                if (!state.dailyLogs) state.dailyLogs = {};
            } else {
                set(dbRef, state);
            }
            
            document.getElementById('db-status').innerHTML = '<i data-lucide="wifi" width="14" height="14" class="text-accent"></i> <span class="text-accent">Live Uplink Secured</span>';
            
            // Sync War Cry Input
            document.getElementById('warcry-input').value = state.warCry || "";
            
            updateUI();
        }, (error) => {
            document.getElementById('db-status').innerHTML = '<i data-lucide="wifi-off" width="14" height="14" class="text-danger"></i> <span class="text-danger">Connection Lost</span>';
            lucide.createIcons();
        });

        function saveData() {
            set(dbRef, state);
        }

        // --- Core Application Functions ---

        window.saveWarCry = function() {
            const val = document.getElementById('warcry-input').value;
            state.warCry = val;
            saveData();
        };

        window.logDeepWork = function(intensity) {
            const today = getTodayStr();
            state.dailyLogs[today] = intensity;
            state.xp += (intensity * 5); // XP Bonus for logging hours
            saveData();
        };

        window.addHabit = function() {
            const nameInput = document.getElementById('habit-name');
            const countInput = document.getElementById('habit-start-count');
            
            const name = nameInput.value.trim();
            const startCount = parseInt(countInput.value) || 0;

            if (!name) return;

            const newHabit = {
                id: Date.now().toString(),
                name: name,
                currentStreak: startCount,
                maxStreak: startCount,
                lastCompleted: null
            };

            state.habits.push(newHabit);
            nameInput.value = '';
            countInput.value = '';
            saveData();
        };

        function checkLevelUp() {
            const levelDisplay = document.getElementById('level-display');
            let status = "Aspirant";
            if (state.xp >= 2000) status = "AIR 1 MATERIAL (Tier 0)";
            else if (state.xp >= 1000) status = "ADVANCE WARRIOR (Tier 1)";
            else if (state.xp >= 500) status = "Mains Ready (Tier 2)";
            else if (state.xp >= 200) status = "Concept Master (Tier 3)";
            
            levelDisplay.innerText = `Rank: ${status}`;
        }

        window.showModal = function(title, msg) {
            const modal = document.getElementById('milestone-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
            
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#10b981', '#3b82f6', '#ffffff'] });
        };

        window.closeModal = function() {
            const modal = document.getElementById('milestone-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.markDone = function(id) {
            const habit = state.habits.find(h => h.id === id);
            const today = getTodayStr();

            if (habit.lastCompleted === today) return;

            habit.currentStreak++;
            habit.lastCompleted = today;
            if (habit.currentStreak > habit.maxStreak) {
                habit.maxStreak = habit.currentStreak;
            }

            state.xp += 25;

            // JEE Specific Milestones
            if (habit.currentStreak === 14) window.showModal("Concept Master", `14 Days of ${habit.name}. Basics are locked in.`);
            else if (habit.currentStreak === 45) window.showModal("Mains Ready", `45 Days of ${habit.name}. You are becoming formidable.`);
            else if (habit.currentStreak === 90) window.showModal("Advance Warrior", `90 Days of ${habit.name}. Welcome to the 1%.`);
            else if ([7, 21, 30, 60].includes(habit.currentStreak)) {
                confetti({ particleCount: 50, spread: 50 });
            }

            saveData();
        };

        window.resetHabit = function(id) {
            const habit = state.habits.find(h => h.id === id);
            
            if (state.shields > 0) {
                const useShield = confirm("Streak endangered! Use 1 Shield to freeze this and prevent reset?");
                if (useShield) {
                    state.shields--;
                    habit.lastCompleted = getTodayStr(); 
                    saveData();
                    return;
                }
            }

            const confirmReset = confirm(`Reset ${habit.name} to 0? This applies the Relapse Tax (UI Penalty).`);
            if (confirmReset) {
                habit.currentStreak = 0;
                habit.lastCompleted = null;
                // Apply 24 Hour Relapse Tax
                state.recoveryUntil = Date.now() + (24 * 60 * 60 * 1000);
                saveData();
            }
        };

        window.deleteHabit = function(id) {
            if(confirm("Delete this mission protocol?")) {
                state.habits = state.habits.filter(h => h.id !== id);
                saveData();
            }
        };

        window.clearData = function() {
            if(confirm("WARNING: Wiping database. Proceed?")) {
                state = { xp: 0, shields: 1, habits: [], dailyLogs: {}, warCry: "", recoveryUntil: null };
                saveData();
            }
        };

        // --- Render Functions ---

        function renderHeatmap() {
            const container = document.getElementById('heatmap-container');
            container.innerHTML = '';
            
            // Generate last 45 days for better fit
            for(let i=44; i>=0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const ds = `${y}-${m}-${day}`;
                
                const hrs = state.dailyLogs?.[ds] || 0;
                let bgClass = "bg-slate-800";
                let extraClass = "";
                
                if (hrs > 0 && hrs <= 3) bgClass = "bg-emerald-900";
                else if (hrs > 3 && hrs <= 7) bgClass = "bg-emerald-600";
                else if (hrs > 7) { bgClass = "bg-emerald-400"; extraClass = "heat-glow"; }

                container.innerHTML += `<div class="w-[14px] h-[14px] rounded-sm ${bgClass} ${extraClass}" title="${ds}: Intensity Level ${hrs}"></div>`;
            }
        }

        function updateUI() {
            // Apply Relapse Tax / Recovery Mode
            const body = document.getElementById('app-body');
            const statusText = document.getElementById('system-status');
            
            if (state.recoveryUntil && Date.now() < state.recoveryUntil) {
                body.classList.add('recovery-mode');
                statusText.innerText = "RECOVERY PROTOCOL ACTIVE // EARN YOUR COLOR BACK";
                statusText.classList.replace('text-accent', 'text-danger');
            } else {
                body.classList.remove('recovery-mode');
                statusText.innerText = "System Online // Target: IIT 2027";
                statusText.classList.replace('text-danger', 'text-accent');
                if (state.recoveryUntil) {
                    state.recoveryUntil = null; // Clear expired tax
                    saveData();
                }
            }

            document.getElementById('xp-display').innerText = state.xp;
            document.getElementById('shield-display').innerText = state.shields;
            checkLevelUp();
            renderHeatmap();

            const container = document.getElementById('habits-container');
            container.innerHTML = '';
            
            const today = getTodayStr();

            state.habits.forEach(habit => {
                const isDoneToday = habit.lastCompleted === today;
                
                // AIR 1 Intensity Logic for Icons
                let iconColor = "text-slate-600";
                let iconGlow = "";
                let iconType = "flame";
                
                if (habit.currentStreak > 0) iconColor = "text-yellow-500";
                if (habit.currentStreak >= 7) iconColor = "text-orange-500";
                if (habit.currentStreak >= 14) { iconColor = "text-danger"; iconType = "zap"; }
                if (habit.currentStreak >= 30) { iconColor = "text-iit"; iconType = "zap"; iconGlow = "iit-glow"; }
                if (habit.currentStreak >= 90) { iconColor = "text-purple-400"; iconType = "crown"; iconGlow = "flame-glow"; }

                const card = document.createElement('div');
                card.className = `glass-card rounded-2xl p-5 flex flex-col relative transition-all duration-300 ${isDoneToday ? 'border-emerald-500/30 bg-emerald-900/10' : ''}`;
                
                card.innerHTML = `
                    <button onclick="window.deleteHabit('${habit.id}')" class="absolute top-4 right-4 text-slate-500 hover:text-danger transition">
                        <i data-lucide="x" width="18" height="18"></i>
                    </button>
                    
                    <div class="flex items-center gap-4 mb-4">
                        <div class="${iconColor} ${iconGlow}">
                            <i data-lucide="${iconType}" width="36" height="36"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg leading-tight w-[80%]">${habit.name}</h3>
                            <p class="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-wider">Max Streak: ${habit.maxStreak}</p>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <div class="text-5xl font-black text-white tracking-tighter">${habit.currentStreak}</div>
                            <div class="text-[10px] uppercase tracking-widest text-gray-500 mt-1 font-bold">Days Active</div>
                        </div>
                        ${isDoneToday ? 
                            `<span class="bg-emerald-500/20 text-emerald-400 text-xs font-bold px-3 py-1.5 rounded flex items-center gap-1"><i data-lucide="check-circle-2" width="14" height="14"></i> SECURED</span>` 
                            : 
                            `<span class="bg-slate-800 text-gray-400 border border-slate-700 text-xs font-bold px-3 py-1.5 rounded flex items-center gap-1"><i data-lucide="clock" width="14" height="14"></i> PENDING</span>`
                        }
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2 mt-auto">
                        <button onclick="window.markDone('${habit.id}')" class="col-span-2 ${isDoneToday ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-accent hover:bg-emerald-400 text-slate-900 shadow-[0_0_15px_rgba(16,185,129,0.2)]'} font-black py-2.5 rounded-lg transition flex justify-center items-center gap-2" ${isDoneToday ? 'disabled' : ''}>
                            ${isDoneToday ? 'Locked' : '<i data-lucide="check" width="18" height="18"></i> Done'}
                        </button>
                        <button onclick="window.resetHabit('${habit.id}')" class="col-span-1 bg-slate-800/80 border border-slate-700 hover:bg-danger hover:border-danger hover:text-white text-gray-400 font-bold py-2.5 rounded-lg transition flex justify-center items-center">
                            <i data-lucide="rotate-ccw" width="16" height="16"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
            
            // Re-initialize Lucide Icons for newly injected HTML
            lucide.createIcons();
        }

        // Initialize Quote
        document.getElementById('daily-quote').innerText = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        
        // Initial Icon render
        lucide.createIcons();

    </script>
</body>
</html>
